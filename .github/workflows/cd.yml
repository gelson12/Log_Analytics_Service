################################################################################
# .github/workflows/cd.yml
#
# Runs on every push to main:
#   1. Build & push Docker image to ECR (tagged with git SHA)
#   2. terraform plan → terraform apply
#   3. Force new ECS deployment
#   4. Smoke-test /version to confirm rollout
#
# Auth: OIDC — no long-lived AWS keys stored anywhere.
# Required GitHub secrets:
#   AWS_DEPLOY_ROLE_ARN  — IAM role ARN with OIDC trust for this repo
#   LOG_BUCKETS          — JSON list e.g. '["base-platform-logs-s3-22-06"]'
################################################################################

name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION:     eu-west-1
  ECR_REPO:       log-analytics-prod
  ECS_CLUSTER:    log-analytics-prod
  ECS_SERVICE:    log-analytics-prod
  TF_WORKING_DIR: terraform/environments/prod

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
  # ────────────────────────────────────────────────────────────────────────────
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      git_sha: ${{ steps.meta.outputs.sha_short }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: meta
        run: |
          SHA_SHORT="${GITHUB_SHA::8}"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push Docker image
        env:
          IMAGE_URI: ${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}:${{ steps.meta.outputs.sha_short }}
        run: |
          docker build \
            --build-arg GIT_SHA="${{ steps.meta.outputs.sha_short }}" \
            --tag "$IMAGE_URI" \
            .
          docker push "$IMAGE_URI"

  # ────────────────────────────────────────────────────────────────────────────
  terraform:
  # ────────────────────────────────────────────────────────────────────────────
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build-and-push
    outputs:
      cloudfront_domain: ${{ steps.tf-outputs.outputs.cloudfront_domain }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var="image_tag=${{ needs.build-and-push.outputs.git_sha }}" \
            -var='log_buckets=${{ secrets.LOG_BUCKETS }}' \
            -out=tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Capture CloudFront domain
        id: tf-outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          CF=$(terraform output -raw cloudfront_domain)
          echo "cloudfront_domain=${CF}" >> "$GITHUB_OUTPUT"

  # ────────────────────────────────────────────────────────────────────────────
  deploy:
  # ────────────────────────────────────────────────────────────────────────────
    name: ECS Rollout & Smoke Test
    runs-on: ubuntu-latest
    needs: [build-and-push, terraform]

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE }}" \
            --force-new-deployment \
            --output text

      - name: Wait for ECS service to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}"

      - name: Smoke test — /version must match deployed SHA
        env:
          CF_DOMAIN:    ${{ needs.terraform.outputs.cloudfront_domain }}
          EXPECTED_SHA: ${{ needs.build-and-push.outputs.git_sha }}
        run: |
          set -euo pipefail
          URL="https://${CF_DOMAIN}/version"
          echo "Checking ${URL}"
          for i in $(seq 1 5); do
            ACTUAL=$(curl -sf "${URL}" | python3 -c "import sys,json; print(json.load(sys.stdin)['git_sha'])")
            echo "Attempt ${i}: got git_sha=${ACTUAL}"
            if [ "${ACTUAL}" = "${EXPECTED_SHA}" ]; then
              echo "Deployed SHA matches"
              exit 0
            fi
            sleep 15
          done
          echo "SHA mismatch: got ${ACTUAL}, expected ${EXPECTED_SHA}"
          exit 1