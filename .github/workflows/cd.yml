################################################################################
# .github/workflows/cd.yml
#
# Runs on every push to main (after a PR is merged):
#   1. Build & push Docker image to ECR (tagged with git SHA)
#   2. terraform plan → terraform apply
#   3. Force a new ECS deployment so the new task definition is picked up
#   4. Smoke-test the /version endpoint to confirm rollout
################################################################################

name: CD

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write   # OIDC — lets us assume an AWS role without long-lived keys

env:
  AWS_REGION:    eu-west-1
  ECR_REPO:      log-analytics-prod
  ECS_CLUSTER:   log-analytics-prod
  ECS_SERVICE:   log-analytics-prod
  TF_WORKING_DIR: terraform/environments/prod

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  build-and-push:
  # ──────────────────────────────────────────────────────────────────────────
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}
      git_sha:   ${{ steps.meta.outputs.sha_short }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: meta
        run: |
          SHA_SHORT="${GITHUB_SHA::8}"
          echo "sha_short=${SHA_SHORT}" >> "$GITHUB_OUTPUT"
          echo "Will tag image with: ${SHA_SHORT}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Log in to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set full image URI
        id: image-uri
        run: |
          REPO_URI="${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}"
          SHORT_SHA="${{ steps.meta.outputs.sha_short }}"
          echo "image_uri=${REPO_URI}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          # Also update the job-level output
          echo "image_uri=${REPO_URI}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            --build-arg GIT_SHA="${{ steps.meta.outputs.sha_short }}" \
            --tag "${{ steps.image-uri.outputs.image_uri }}" \
            --cache-from "${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}:latest" \
            .

      - name: Push to ECR
        run: |
          docker push "${{ steps.image-uri.outputs.image_uri }}"
          # Also tag as 'latest' for cache reuse on next build
          docker tag \
            "${{ steps.image-uri.outputs.image_uri }}" \
            "${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}:latest"
          docker push "${{ steps.ecr-login.outputs.registry }}/${{ env.ECR_REPO }}:latest"

      - name: Export image URI to job output
        run: |
          echo "image_uri=${{ steps.image-uri.outputs.image_uri }}" >> "$GITHUB_OUTPUT"
        id: final-meta

  # ──────────────────────────────────────────────────────────────────────────
  terraform:
  # ──────────────────────────────────────────────────────────────────────────
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production   # optional: requires manual approval in GitHub

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="region=${{ env.AWS_REGION }}"

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var="image_tag=${{ needs.build-and-push.outputs.git_sha }}" \
            -var="vpc_id=${{ secrets.VPC_ID }}" \
            -var="public_subnet_ids=${{ secrets.PUBLIC_SUBNET_IDS }}" \
            -var="private_subnet_ids=${{ secrets.PRIVATE_SUBNET_IDS }}" \
            -var='log_buckets=${{ secrets.LOG_BUCKETS }}' \
            -out=tfplan

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Export CloudFront domain
        working-directory: ${{ env.TF_WORKING_DIR }}
        id: tf-outputs
        run: |
          CF_DOMAIN=$(terraform output -raw cloudfront_domain)
          echo "cloudfront_domain=${CF_DOMAIN}" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────────────────
  deploy:
  # ──────────────────────────────────────────────────────────────────────────
    name: ECS Rollout & Smoke Test
    runs-on: ubuntu-latest
    needs: [build-and-push, terraform]

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --service "${{ env.ECS_SERVICE }}" \
            --force-new-deployment \
            --output text

      - name: Wait for ECS service to stabilise
        run: |
          aws ecs wait services-stable \
            --cluster "${{ env.ECS_CLUSTER }}" \
            --services "${{ env.ECS_SERVICE }}"

      - name: Smoke test — /version matches deployed SHA
        env:
          CF_DOMAIN:   ${{ needs.terraform.outputs.cloudfront_domain }}
          EXPECTED_SHA: ${{ needs.build-and-push.outputs.git_sha }}
        run: |
          set -euo pipefail
          URL="https://${CF_DOMAIN}/version"
          echo "Checking ${URL}"
          # CloudFront can take a moment; retry up to 5 times
          for i in $(seq 1 5); do
            ACTUAL=$(curl -sf "${URL}" | python3 -c "import sys,json; print(json.load(sys.stdin)['git_sha'])")
            echo "Attempt ${i}: got git_sha=${ACTUAL}"
            if [ "${ACTUAL}" = "${EXPECTED_SHA}" ]; then
              echo "✓ Deployed SHA matches"
              exit 0
            fi
            sleep 10
          done
          echo "✗ Deployed SHA ${ACTUAL} != expected ${EXPECTED_SHA}"
          exit 1
