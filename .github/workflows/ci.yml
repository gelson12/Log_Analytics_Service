################################################################################
# .github/workflows/ci.yml
#
# Runs on every PR:
#   1. Lint (ruff)
#   2. Unit tests (including streaming memory assertion)
#   3. Terraform format / validate check (no AWS calls)
################################################################################

name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  lint-and-test:
  # ──────────────────────────────────────────────────────────────────────────
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check src/ tests/

      - name: Run tests
        run: |
          python -m pytest tests/ \
            -v \
            --tb=short \
            --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

  # ──────────────────────────────────────────────────────────────────────────
  terraform-validate:
  # ──────────────────────────────────────────────────────────────────────────
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.5"

      - name: Terraform fmt check (all modules)
        run: |
          terraform fmt -check -recursive terraform/
          terraform fmt -check infra/

      - name: Validate ECR module
        working-directory: terraform/modules/ecr
        run: terraform init -backend=false && terraform validate

      - name: Validate IAM module
        working-directory: terraform/modules/iam
        run: terraform init -backend=false && terraform validate

      - name: Validate ECS module
        working-directory: terraform/modules/ecs
        run: terraform init -backend=false && terraform validate

      - name: Validate CloudFront module
        working-directory: terraform/modules/cloudfront
        run: terraform init -backend=false && terraform validate
